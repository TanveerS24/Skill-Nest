spring.application.name=skillnest-backend
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/skillnest
spring.datasource.username=skillnest
spring.datasource.password=skillnest123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000ms
spring.data.redis.database=0

# JWT Configuration
jwt.secret=your-secret-key-change-in-production-environment
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Logging
logging.level.root=INFO
logging.level.com.skillnest=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Load Balancer Configuration
loadbalancer.enabled=${LOADBALANCER_ENABLED:true}
loadbalancer.instances[0]=${LOADBALANCER_INSTANCES_0:http://localhost:8081}
loadbalancer.instances[1]=${LOADBALANCER_INSTANCES_1:http://localhost:8082}
loadbalancer.instances[2]=${LOADBALANCER_INSTANCES_2:http://localhost:8083}
