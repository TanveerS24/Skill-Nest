version: '3.8'

services:
  # Auto-scaler service
  scaler:
    build:
      context: ./scaler
      dockerfile: Dockerfile
    container_name: skillnest-scaler
    environment:
      DATABASE_URL: postgresql://skillnest:skillnest@postgres:5432/skillnest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "9090:9090"
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount Nginx config directory
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillnest-network
    restart: unless-stopped

  # Nginx load balancer
  nginx:
    image: nginx:alpine
    container_name: skillnest-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - ai-service
      - scaler
    networks:
      - skillnest-network
    restart: unless-stopped

networks:
  skillnest-network:
    external: true
