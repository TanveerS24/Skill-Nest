version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: skillnest-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
      POSTGRES_DB: skillnest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - skillnest-network

volumes:
  pgdata:

networks:
  skillnest-network:
    driver: bridge
