version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillnest-postgres
    environment:
      POSTGRES_DB: skillnest
      POSTGRES_USER: skillnest
      POSTGRES_PASSWORD: skillnest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillnest"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillnest-network

  redis:
    image: redis:7-alpine
    container_name: skillnest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillnest-network

  backend:
    build:
      context: ./springboot-backend
      dockerfile: Dockerfile
    container_name: skillnest-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skillnest
      SPRING_DATASOURCE_USERNAME: skillnest
      SPRING_DATASOURCE_PASSWORD: skillnest
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillnest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillnest-frontend
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - skillnest-network

volumes:
  postgres_data:
  redis_data:

networks:
  skillnest-network:
    driver: bridge
