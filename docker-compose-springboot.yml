version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillnest-postgres
    environment:
      POSTGRES_DB: skillnest
      POSTGRES_USER: skillnest
      POSTGRES_PASSWORD: skillnest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillnest"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillnest-network

  redis:
    image: redis:7-alpine
    container_name: skillnest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillnest-network

  backend:
    build:
      context: ./springboot-backend
      dockerfile: Dockerfile
    container_name: skillnest-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skillnest
      SPRING_DATASOURCE_USERNAME: skillnest
      SPRING_DATASOURCE_PASSWORD: skillnest
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillnest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillnest-frontend
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - skillnest-network

  ollama:
    image: ollama/ollama:latest
    container_name: skillnest-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - skillnest-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: skillnest-ai-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://skillnest:skillnest@postgres:5432/skillnest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
      CHROMADB_PATH: /app/chroma_db
      EXECUTION_TIMEOUT: 2
      DEBUG: false
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - skillnest-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  chroma_data:

networks:
  skillnest-network:
    driver: bridge
